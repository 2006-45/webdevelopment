<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Details Form</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #e806cd 0%, #6a82fb 100%);
            min-height: 100vh;
            margin: 0;
        }
        .container {
            max-width: 420px;
            margin: 48px auto;
            background: rgba(255,255,255,0.95);
            padding: 32px 28px 28px 28px;
            border-radius: 18px;
            box-shadow: 0 8px 32px rgba(106,130,251,0.18), 0 2px 8px rgba(0,0,0,0.08);
            transition: box-shadow 0.3s;
        }
        .container:hover {
            box-shadow: 0 12px 40px rgba(106,130,251,0.25), 0 4px 16px rgba(0,0,0,0.10);
        }
        h2 {
            text-align: center;
            color: #6a82fb;
            margin-bottom: 24px;
            letter-spacing: 1px;
        }
        label {
            display: block;
            margin-top: 18px;
            color: #333;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        input, select {
            width: 100%;
            padding: 10px 12px;
            margin-top: 6px;
            border: 1.5px solid #d1d5db;
            border-radius: 6px;
            background: #f8f9fa;
            font-size: 1rem;
            transition: border 0.2s, box-shadow 0.2s;
            outline: none;
        }
        input:focus, select:focus {
            border: 1.5px solid #6a82fb;
            box-shadow: 0 0 0 2px #e6eaff;
        }
        button {
            margin-top: 28px;
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, #6a82fb 0%, #e806cd 100%);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(106,130,251,0.10);
            transition: background 0.2s, box-shadow 0.2s;
        }
        button:hover {
            background: linear-gradient(90deg, #e806cd 0%, #6a82fb 100%);
            box-shadow: 0 4px 16px rgba(106,130,251,0.18);
        }
        /* Gender radio buttons styling */
        [name="gender"] {
            width: auto;
            margin-right: 6px;
        }
        .container div[style] label {
            margin-right: 18px !important;
            font-weight: 400;
            color: #555;
        }
        /* Responsive */
        @media (max-width: 500px) {
            .container {
                padding: 16px 4vw 18px 4vw;
            }
            h2 {
                font-size: 1.3rem;
            }
            input, select {
                font-size: 0.98rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Student Details Form</h2>
        <form>
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>

            <label for="age">Age</label>
            <input type="number" id="age" name="age" min="1" required>

            <label>Gender</label>
            <div style="margin-top: 4px;">
                <input type="radio" id="male" name="gender" value="Male" required>
                <label for="male" style="display:inline; margin-right:10px;">Male</label>
                <input type="radio" id="female" name="gender" value="Female">
                <label for="female" style="display:inline; margin-right:10px;">Female</label>
                <input type="radio" id="other" name="gender" value="Other">
                <label for="other" style="display:inline;">Other</label>
                    <input type="radio" id="prefer-not-to-say" name="gender" value="Prefer not to say">
                    <label for="prefer-not-to-say" style="display:inline;">Prefer not to say</label>
            </div>

            <label for="course">Course</label>
            <select id="course" name="course" required>
                <option value="">Select a course</option>
                <option value="Computer Science">Computer Science</option>
                <option value="Cybersecurity">Cybersecurity</option>
                <option value="Mathematical Science">Mathematical Science</option>
                    <option value="Business Administration">Business Administration</option>
                    <option value="Law">Law</option>
                    <option value="Medicine">Medicine</option>
                    <option value="Education">Education</option>
            </select>

            <label for="country">Country</label>
            <select id="country" name="country" required>
                <option value="">Select a country</option>
                <option value="Kenya">Kenya</option>
                <option value="Uganda">Uganda</option>
                <option value="Tanzania">Tanzania</option>
                <option value="Rwanda">Rwanda</option>
                <option value="South Sudan">South Sudan</option>
                <option value="Other">Other</option>
            </select>

            <label for="year">Year of Study</label>
            <select id="year" name="year" required>
                <option value="">Select year</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
            </select>

                <label for="semester">Semester</label>
                <select id="semester" name="semester" required>
                    <option value="">Select semester</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                </select>

            <button type="submit">Submit</button>
        </form>
    </div>
</body>
</html>

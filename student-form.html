<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Details Form</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; }
        .container { max-width: 400px; margin: 40px auto; background: #fff; padding: 24px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; }
        label { display: block; margin-top: 16px; }
        input, select { width: 100%; padding: 8px; margin-top: 4px; border: 1px solid #ccc; border-radius: 4px; }
        button { margin-top: 20px; width: 100%; padding: 10px; background: #007bff; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Student Details Form</h2>
        <form>
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>

            <label for="age">Age</label>
            <input type="number" id="age" name="age" min="1" required>

            <label>Gender</label>
            <div style="margin-top: 4px;">
                <input type="radio" id="male" name="gender" value="Male" required>
                <label for="male" style="display:inline; margin-right:10px;">Male</label>
                <input type="radio" id="female" name="gender" value="Female">
                <label for="female" style="display:inline; margin-right:10px;">Female</label>
                <input type="radio" id="other" name="gender" value="Other">
                <label for="other" style="display:inline;">Other</label>
                    <input type="radio" id="prefer-not-to-say" name="gender" value="Prefer not to say">
                    <label for="prefer-not-to-say" style="display:inline;">Prefer not to say</label>
            </div>

            <label for="course">Course</label>
            <select id="course" name="course" required>
                <option value="">Select a course</option>
                <option value="Computer Science">Computer Science</option>
                <option value="Cybersecurity">Cybersecurity</option>
                <option value="Mathematical Science">Mathematical Science</option>
                <option value="Physics">Physics</option>
                <option value="Chemistry">Chemistry</option>
                <option value="Biology">Biology</option>
            </select>

            <label for="country">Country</label>
            <select id="country" name="country" required>
                <option value="">Select a country</option>
                <option value="Kenya">Kenya</option>
                <option value="Uganda">Uganda</option>
                <option value="Tanzania">Tanzania</option>
                <option value="Rwanda">Rwanda</option>
                <option value="South Sudan">South Sudan</option>
                <option value="Other">Other</option>
            </select>

            <label for="year">Year of Study</label>
            <select id="year" name="year" required>
                <option value="">Select year</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
            </select>

                <label for="semester">Semester</label>
                <select id="semester" name="semester" required>
                    <option value="">Select semester</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                </select>

            <button type="submit">Submit</button>
        </form>
    </div>
</body>
</html>
